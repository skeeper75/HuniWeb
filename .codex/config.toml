[shell_environment_policy]
inherit = "core"

[shell_environment_policy.set]
CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS = "1"
CLAUDE_CODE_FILE_READ_MAX_OUTPUT_TOKENS = "64000"
ENABLE_TOOL_SEARCH = "1"
MOAI_CONFIG_SOURCE = "sections"
CLAUDE_CODE_NO_FLICKER = "1"
CLAUDE_CODE_SUBPROCESS_ENV_SCRUB = "1"
PATH = "/Users/innojini/.local/bin:/Users/innojini/go/bin:/opt/homebrew/bin:/opt/homebrew/sbin:/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/local/sbin:/usr/bin:/bin:/usr/sbin:/sbin"

[mcp_servers.context7]
command = "/bin/bash"
args = [
    "-l",
    "-c",
    "exec npx -y @upstash/context7-mcp@latest",
]

[mcp_servers.moai-lsp]
command = "moai"
args = [
    "mcp",
    "lsp",
]

[mcp_servers.sequential-thinking]
command = "/bin/bash"
args = [
    "-l",
    "-c",
    "exec npx -y @modelcontextprotocol/server-sequential-thinking",
]
