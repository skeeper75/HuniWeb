<script>
	function form_submit() {
		var item = document.item;

		if (item.user_id.value == "")
		{
			alert("아이디를 입력해 주세요.");
			item.user_id.focus();
			return;
		}

		if (item.user_pwd.value == "")
		{
			alert("비밀번호를 입력해 주세요.");
			item.user_pwd.focus();
			return;
		}

		if (item.user_name.value == "")
		{
			alert("이름을 입력해 주세요.");
			item.user_name.focus();
			return;
		}

		if (item.user_email.value == "")
		{
			alert("이메일을 입력해 주세요.");
			item.user_email.focus();
			return;
		}

		if ((isNaN(item.user_hp1.value)) || (Number(item.user_hp1.value) < 0) || (item.user_hp1.value == ""))
		{
			alert("휴대전화를 입력해 주세요.");
			item.user_hp1.focus();
			return;
		}

		if ((isNaN(item.user_hp2.value)) || (Number(item.user_hp2.value) < 0) || (item.user_hp2.value == ""))
		{
			alert("휴대전화를 입력해 주세요.");
			item.user_hp2.focus();
			return;
		}

		if ((isNaN(item.user_hp3.value)) || (Number(item.user_hp3.value) < 0) || (item.user_hp3.value == ""))
		{
			alert("휴대전화를 입력해 주세요.");
			item.user_hp3.focus();
			return;
		}

		if (item.b_content.value == "")
		{
			alert("탈퇴사유를 입력해 주세요.");
			item.b_content.focus();
			return;
		}

		if (confirm("후니프린팅을 탈퇴하시겠습니까?\n\n탈퇴즉시 고객님의 모든 정보는 삭제됩니다."))
		{
			item.submit();
		}
	}
</script>
