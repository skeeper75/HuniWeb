<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>액세서리 상품명 — 후니프린팅</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="./ds-base.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ProductGallery.jsx"></script>
<script type="text/babel" src="Configurator.jsx"></script>
<style>
  html, body { margin: 0; background: var(--huni-white); font-family: "Noto Sans KR", "Noto Sans", sans-serif; }
  .page   { max-width: 1180px; margin: 0 auto; padding: 40px 24px 80px; }
  .layout { display: grid; grid-template-columns: minmax(0, 1fr) 466px; gap: 48px; align-items: start; }
  @media (max-width: 920px) { .layout { grid-template-columns: 1fr; } }
  .toast { position: fixed; left: 50%; bottom: 32px; transform: translate(-50%, 24px); display: flex; align-items: center; gap: 12px; background: var(--huni-gray-800); color: #fff; padding: 14px 20px; border-radius: var(--radius-md); box-shadow: var(--shadow-dropdown); font-size: var(--text-base); letter-spacing: var(--tracking-tight); opacity: 0; pointer-events: none; transition: opacity .2s ease, transform .2s ease; z-index: 50; }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }
  .toast a { color: var(--huni-purple-400); font-weight: var(--weight-bold); text-decoration: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  function boot() {
    const DS = window.HuniPrintingDesignSystem_0546d5;
    const ready = DS && window.AccessoryGallery && window.AccessoryConfigurator;
    if (!ready) return setTimeout(boot, 40);
    const { Badge, Button, QuantityStepper, OptionField, OptionButtonGroup } = DS;
    function App() {
      const [toast, setToast] = React.useState(null);
      const addToCart = (a) => { setToast(a.toLocaleString("ko-KR")); clearTimeout(window.__t); window.__t = setTimeout(() => setToast(null), 2800); };
      return (
        <main className="page">
          <div className="layout">
            <window.AccessoryGallery Badge={Badge} />
            <window.AccessoryConfigurator OptionField={OptionField} OptionButtonGroup={OptionButtonGroup} QuantityStepper={QuantityStepper} Button={Button} onAddToCart={addToCart} />
          </div>
          <div className={"toast" + (toast ? " show" : "")}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style={{flex:"none"}}><path d="M5 6h16l-2 9H7L5 6zm0 0L4 3H2m5 17a1 1 0 100 2 1 1 0 000-2zm10 0a1 1 0 100 2 1 1 0 000-2z" stroke="#fff" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
            <span>장바구니에 담았어요 · {toast}원</span><a href="#">장바구니 보기 →</a>
          </div>
        </main>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  }
  boot();
</script>
</body>
</html>
