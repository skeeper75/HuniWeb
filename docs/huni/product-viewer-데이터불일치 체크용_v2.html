let cur = null;
const esc = s => (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function renderList(){
  const q = document.getElementById('q').value.trim().toLowerCase();
  const onlyflag = document.getElementById('onlyflag').checked;
  const box = document.getElementById('items'); box.innerHTML='';
  P.products.filter(p=>{
    if(onlyflag && p.nf===0) return false;
    if(!q) return true;
    return (p.nm||'').toLowerCase().includes(q) || (p.cd||'').toLowerCase().includes(q);
  }).forEach(p=>{
    const d=document.createElement('div');
    d.className='item'+(cur===p.cd?' active':'');
    d.onclick=()=>{cur=p.cd;renderList();renderDetail(p.cd);};
    d.innerHTML=`<span class="nm">${esc(p.nm)}<div class="cd">${esc(p.cd)} · ${esc(p.typ)}</div></span>`+
      `<span class="badge${p.nf?'':' zero'}">${p.nf}</span>`;
    box.appendChild(d);
  });
}

function row(cells, flagged, fcode, fdesc){
  return `<tr class="${flagged?'flagged':''}">`+cells.map(c=>`<td>${c}</td>`).join('')+
    `<td class="fcode">${fcode||''}</td><td class="fdesc">${fdesc?esc(fdesc):''}</td></tr>`;
}

function findFor(pc,dim,target){
  return P.findings.filter(f=>f.prd_cd===pc&&f.dim===dim&&String(f.target)===String(target));
}

function renderDetail(pc){
  const r=P.data[pc]; const det=document.getElementById('detail');
  const fs=P.findings.filter(f=>f.prd_cd===pc);
  let h=`<div class="topbar"><h2>${esc(r.prd_nm)} <span class="badge${fs.length?'':' zero'}">${fs.length}</span></h2>`+
    `<div class="sub">${esc(r.prd_cd)} · ${esc(r.prd_typ)} · 비규격:${esc(r.nonspec_yn)} · 수량 ${esc(r.min_qty)}~${esc(r.max_qty)} · 사용:${esc(r.use_yn)}</div></div>`;

  if(fs.length){
    h+=`<div class="findings-box"><h3>⚠ 어색함 ${fs.length}건</h3><ul>`;
    fs.forEach(f=>{ h+=`<li><span class="fcode">${f.code}</span> <span class="pill">${f.dim}</span> <span class="sev-${f.sev}">${esc(f.desc)}</span></li>`; });
    h+=`</ul></div>`;
  }

  // 카테고리
  h+=sec('카테고리', r.cat, ['카테고리','주'], r.cat.map(c=>row([esc(c.cat),esc(c.main)],false)));
  // 사이즈
  h+=sec('사이즈', r.siz, ['코드','사이즈명','작업W','작업H','재단W','재단H','기본'],
     r.siz.map(s=>{const f=findFor(pc,'siz',s.cd); const fl=f.length>0;
       return row([esc(s.cd),esc(s.nm),esc(s.ww),esc(s.wh),esc(s.cw),esc(s.ch),esc(s.dflt)],fl,
         f.map(x=>x.code).join('<br>'),f.map(x=>x.desc).join(' / '));}));
  // 도수/인쇄옵션
  h+=sec('도수 / 인쇄옵션', r.po, ['옵션','인쇄면','앞도수','뒤도수','기본'],
     r.po.map(o=>{const f=findFor(pc,'po',o.opt); const fl=f.length>0;
       return row([esc(o.opt),esc(o.side),esc(o.front),esc(o.back),esc(o.dflt)],fl,
         f.map(x=>x.code).join('<br>'),f.map(x=>x.desc).join(' / '));}));
  // 판형
  h+=sec('판형', r.plt, ['사이즈','출력파일','용지','기본'],
     r.plt.map(p=>{const f=findFor(pc,'plt',p.siz); const fl=f.length>0;
       return row([esc(p.siz),esc(p.oft),esc(p.paper),esc(p.dflt)],fl,
         f.map(x=>x.code).join('<br>'),f.map(x=>x.desc).join(' / '));}));
  // 자재
  h+=sec('자재', r.mat, ['코드','자재명','유형','용도','기본','공유'],
     r.mat.map(m=>{const f=findFor(pc,'mat',m.cd); const fl=f.length>0;
       const sh=m.shared>1?`<span class="shared">${m.shared}개 제품 공유</span>`:`${m.shared} (단독)`;
       return row([esc(m.cd),esc(m.nm),esc(m.typ),esc(m.usage),esc(m.dflt),sh],fl,
         f.map(x=>x.code).join('<br>'),f.map(x=>x.desc).join(' / '));}));
  // 공정
  h+=sec('공정', r.proc, ['공정','필수'], r.proc.map(p=>row([esc(p.nm),esc(p.mand)],false)));
  // 묶음수
  h+=sec('묶음수', r.bdl, ['수량','단위','기본'], r.bdl.map(b=>row([esc(b.qty),esc(b.unit),esc(b.dflt)],false)));
  // 추가상품
  h+=sec('추가상품', r.addon, ['추가상품'], r.addon.map(a=>row([esc(a.nm)],false)));

  det.innerHTML=h; det.scrollTop=0;
}

function sec(title, arr, heads, bodyRows){
  let h=`<section><h3>${title} <span style="color:#999;font-weight:400">(${arr.length})</span></h3>`;
  if(!arr.length){ h+=`<div class="empty">없음</div></section>`; return h; }
  h+=`<table><tr>`+heads.map(x=>`<th>${x}</th>`).join('')+`<th>코드</th><th>Description</th></tr>`+bodyRows.join('')+`</table></section>`;
  return h;
}

renderList();
</script></body></html>
